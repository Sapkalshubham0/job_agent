name: AI Job Hunter Agent

on:
  schedule:
    # Runs automatically every 30 minutes
    - cron: '14,44 * * * *'
  workflow_dispatch: 
    # This allows you to manually trigger the script from the GitHub Actions tab

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      # Updated to @main to resolve Node.js 20 deprecation warning
      - name: Checkout repository
        uses: actions/checkout@main
        
      # Updated to @main to resolve Node.js 20 deprecation warning
      - name: Set up Python
        uses: actions/setup-python@main
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
          
      - name: Run Job Hunter Script
        env:
          # Pulling your hidden secrets into the environment variables
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # FIREBASE_SERVICE_ACCOUNT is removed from here and decoded below
        run: |
          # Safely decode the Base64 Firebase secret to preserve all newline formatting
          export FIREBASE_SERVICE_ACCOUNT=$(echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode)
          
          # Run the scraper
          python job_agent.py
